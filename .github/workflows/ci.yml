# CI 構成 (ippoan/alc-app-s3 の方式を踏襲、C/idf.py 向けに簡略化):
#
#   PR / main = espressif/esp-idf-ci-action で idf.py build (esp32p4)
#   auto-merge (ippoan 標準の reusable) を build 通過後に実行
#
# alc-app-s3 (Rust + esp-idf-sys) は cargo/rust-cache 起因のキャッシュ管理が
# 複雑だが、本リポジトリは素の ESP-IDF (C, idf.py) のため espressif 公式の
# Docker ベースアクションで十分 (docker image 自体が GHA のレイヤーキャッシュで
# 再利用される。手動キャッシュ設定は不要)。
#
# ビルド対象: examples/hello_world (実機書き込み疎通確認用、docs/hardware-notes.md
# 参照) + relay (alc-gw-p4#1 の中継本体、リポジトリルート) +
# host_test_rtsp (components/rtsp_client の digest/SDP/状態遷移ロジックを
# 実機無しで検証する ESP-IDF linux target ビルド。PR1 で追加)。
name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# auto-merge reusable (App token で merge + PR write) に必要
permissions:
  contents: write
  pull-requests: write

# PR は最新コミット優先で実行中 run をキャンセルする。main はキャンセルしない
# (ippoan/alc-app-s3, ippoan/alc-gw と同じ判断)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # examples/hello_world/sdkconfig.defaults / docs/hardware-notes.md と揃える。
  # 上げる時は両方を合わせて更新すること
  ESP_IDF_VERSION: v5.5.3

jobs:
  build:
    name: "Build (${{ matrix.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hello_world
            path: examples/hello_world
            target: esp32p4
            command: idf.py build
          - name: relay
            path: .
            target: esp32p4
            command: idf.py build
          # linux target での host テスト。実機・esp32p4 トールチェーンなしで
          # digest/SDP/RTSP状態遷移のロジックを検証する (components/rtsp_client/host_test)。
          # 【要確認、環境リスク】esp-idf-ci-action の Docker イメージで linux target
          # ビルドが通るか、--preview フラグが v5.5.3 でまだ必要かは未検証。
          # 通らない場合は素の ubuntu-latest job + gcc + mbedtls の md5/base64 実装を
          # vendor するフォールバックに切り替える (実装計画 PR1 のリスク節参照)。
          - name: host_test_rtsp
            path: components/rtsp_client/host_test
            target: linux
            command: idf.py --preview build && ./build/rtsp_client_host_test.elf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: idf.py build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.ESP_IDF_VERSION }}
          target: ${{ matrix.target }}
          path: ${{ matrix.path }}
          command: ${{ matrix.command }}

  auto-merge:
    name: Auto Merge
    needs: [build]
    if: github.event_name == 'pull_request'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    secrets: inherit
